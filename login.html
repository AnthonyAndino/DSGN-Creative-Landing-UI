<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="CSS/login.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">

<body>

    <main class="login-wrapper">
        <div class="card-form">
            <section class="email-form">
                <div class="minimal-logo">DSGN</div>

                <h1 class="card-title">Ingresa con email</h1>
                <p class="card-subtitle">Crea, colabora y destaca. Todo en un solo lugar. Gratis.</p>

                <form action="index.html">
                    <div class="input-group">
                        <i class="fas fa-envelope icon"></i>
                        <input type="email" placeholder="Usuario / Correo">
                    </div>

                    <div class="input-group">
                        <i class="fas fa-lock icon"></i>
                        <input type="password" placeholder="Contraseña">
                    </div>

                    <div class="form-options">
                        <a href="#" class="forgot-link">Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-primary-neon access">Acceder</button>

                    <a href="registro.html" class="register-link">No tienes cuenta? Registrate</a>
                </form>
            </section>

            <section class="social-signin">
                <div class="divider">
                    <span>O ingresa con</span>
                </div>

                <div class="social-icons">
                    <button type="button" class="social-btn mail"><i class="fab fa-google"></i></button>
                    <button type="button" class="social-btn fb"><i class="fab fa-facebook-f"></i></button>
                    <button type="button" class="social-btn tw"><i class="fab fa-x-twitter"></i></button>
                    <button type="button" class="social-btn ig"><i class="fab fa-instagram"></i></button>
                </div>

            </section>
        </div>
    </main>

</body>

</html>
